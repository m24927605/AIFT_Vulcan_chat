services:
  frontend:
    build:
      context: ./frontend
      target: builder
    command: npm run dev
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000

  backend:
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    environment:
      - DATA_DIR=/app/data

  worker:
    volumes:
      - ./backend/app:/app/app
